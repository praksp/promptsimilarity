quarkus.application.name=api-gateway
quarkus.http.port=8080
# Prompt service REST API (gateway calls prompt-service via HTTP)
quarkus.rest-client.prompt-service.url=http://localhost:8082

# CORS: allow dashboard (Vite dev and production) to call the API
quarkus.http.cors=true
quarkus.http.cors.origins=http://localhost:3000,http://localhost:3001,http://localhost:3002,http://localhost:5173,http://127.0.0.1:3000,http://127.0.0.1:3001,http://127.0.0.1:3002,http://127.0.0.1:5173
quarkus.http.cors.methods=GET,POST,OPTIONS
quarkus.http.cors.headers=accept,content-type
quarkus.http.cors.exposed-headers=
