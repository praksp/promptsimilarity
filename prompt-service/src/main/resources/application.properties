quarkus.application.name=prompt-service
quarkus.http.host=0.0.0.0
# gRPC over HTTP/2 on same port as HTTP (8080)
quarkus.http.http2=true
quarkus.grpc.server.use-separate-server=false
quarkus.generate-code.grpc.scan-for-proto=com.promptsimilarity:proto
quarkus.grpc.clients.vector.host=localhost
quarkus.grpc.clients.vector.port=9002
quarkus.grpc.clients.search.host=localhost
quarkus.grpc.clients.search.port=9003
quarkus.grpc.clients.notification.host=localhost
quarkus.grpc.clients.notification.port=9004
quarkus.grpc.clients.collaboration.host=localhost
quarkus.grpc.clients.collaboration.port=9005
quarkus.grpc.clients.graph.host=localhost
quarkus.grpc.clients.graph.port=9006
quarkus.grpc.clients.featurestore.host=localhost
quarkus.grpc.clients.featurestore.port=9007

# Similarity threshold for notifications
prompt.similarity.threshold=0.85

# Embedding service (sentence-transformers). Leave empty for stub embeddings.
embedding.service.url=http://localhost:8081

# Ollama LLM (RAG). Leave empty to skip LLM and return stub.
llm.ollama.url=http://localhost:11434
llm.ollama.model=llama2

# RAG: min similarity to suggest a cached response (0.0-1.0)
rag.similarity.threshold=0.65

# Redis: prompt repository persistence (write-through cache). Override in Docker.
quarkus.redis.hosts=redis://localhost:6379
