syntax = "proto3";

package featurestore.v1;

option java_multiple_files = true;
option java_package = "com.promptsimilarity.proto.featurestore.v1";
option java_outer_classname = "FeatureStoreProto";

service FeatureStoreService {
  rpc WritePromptFeatures(WritePromptFeaturesRequest) returns (WritePromptFeaturesResponse);
  rpc ReadPromptFeatures(ReadPromptFeaturesRequest) returns (ReadPromptFeaturesResponse);
  rpc WriteTopicAggregate(WriteTopicAggregateRequest) returns (WriteTopicAggregateResponse);
  rpc ReadTopicAggregate(ReadTopicAggregateRequest) returns (ReadTopicAggregateResponse);
}

message WritePromptFeaturesRequest {
  string prompt_id = 1;
  string user_id = 2;
  string org_id = 3;
  map<string, FeatureValue> features = 4;
  int64 ttl_seconds = 5;
}

message FeatureValue {
  oneof value {
    bytes bytes_value = 1;
    double double_value = 2;
    int64 int_value = 3;
    string string_value = 4;
  }
}

message WritePromptFeaturesResponse {
  bool success = 1;
}

message ReadPromptFeaturesRequest {
  string prompt_id = 1;
  repeated string feature_names = 2;
}

message ReadPromptFeaturesResponse {
  map<string, FeatureValue> features = 1;
}

message WriteTopicAggregateRequest {
  string org_id = 1;
  string topic_key = 2;
  int32 user_count = 3;
  repeated string user_ids = 4;
  int64 updated_at = 5;
  int64 ttl_seconds = 6;
}

message WriteTopicAggregateResponse {
  bool success = 1;
}

message ReadTopicAggregateRequest {
  string org_id = 1;
  string topic_key = 2;
}

message ReadTopicAggregateResponse {
  int32 user_count = 1;
  repeated string user_ids = 2;
  int64 updated_at = 3;
}
